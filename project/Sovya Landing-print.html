<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sovya — Building without the blindfolds.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* ── Print overrides ───────────────────────────────────────────── */
    @page {
      size: A4 landscape;
      margin: 12mm;
    }

    html, body {
      background: #fff !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Force a static, paginated layout */
    .page {
      opacity: 1 !important;
      min-height: auto;
      max-width: 100%;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* Kill all entrance animations & dynamic offsets */
    .hero-line,
    .hero-sub,
    .panels,
    .hero-line.line-1,
    .hero-line.line-2,
    .hero-line.line-3 {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
    }

    .topbar {
      padding-bottom: 18mm;
      break-after: avoid;
    }

    .hero {
      break-inside: avoid;
      padding-bottom: 14mm;
    }

    /* Allow the headline to shrink to fit print width */
    .hero-headline {
      font-size: clamp(48px, 8vw, 96px) !important;
      line-height: 1.0 !important;
    }

    .panels {
      break-inside: avoid;
      gap: 8mm;
      padding-bottom: 10mm;
    }

    .panel {
      break-inside: avoid;
      box-shadow: none;
      /* keep the amber bg in print */
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Hide interactive-only chrome */
    .btn-arrow { display: none; }
    .btn { cursor: default; }

    /* Hide the Tweaks panel + any toolbar artefacts */
    [data-tweaks-panel],
    .twk-panel,
    .twk-toggle,
    iframe { display: none !important; }

    @media print {
      body { background: #fff !important; }
      .topbar-pill, .footer { break-inside: avoid; }
      /* Defensive: drop any user-set dark body bg in print */
      body[style] { background-color: #fff !important; }
    }
  </style>
</head>
<body style="background-color: #ffffff">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    // Wait for React to mount, fonts to load, then auto-print.
    (async function autoPrint() {
      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
      } catch (e) {}
      // Wait for root to populate
      const root = document.getElementById("root");
      const start = Date.now();
      while (!root.firstChild && Date.now() - start < 4000) {
        await new Promise((r) => setTimeout(r, 80));
      }
      // Safety pad for animations/styles to settle
      await new Promise((r) => setTimeout(r, 600));
      window.print();
    })();
  </script>
</body>
</html>
